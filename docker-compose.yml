services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: inputhaven-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inputhaven
      POSTGRES_PASSWORD: inputhaven_dev_2024
      POSTGRES_DB: inputhaven
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inputhaven"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching, sessions, rate limiting, queues
  redis:
    image: redis:7-alpine
    container_name: inputhaven-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible file storage
  minio:
    image: minio/minio:latest
    container_name: inputhaven-storage
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: inputhaven
      MINIO_ROOT_PASSWORD: inputhaven_dev_2024
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MailHog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: inputhaven-mail
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
  minio_data:
